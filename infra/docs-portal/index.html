<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Charity Platform API Docs</title>
    <!-- Absolute /docs/* paths so assets work with or without trailing slash after Kong strip_path -->
    <link rel="stylesheet" href="/docs/swagger-ui.css" />
    <link rel="icon" type="image/png" href="/docs/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/docs/favicon-16x16.png" sizes="16x16" />
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:before, *:after { box-sizing: inherit; }
      body { margin: 0; background: #fafafa; }
      .topbar { display: none; }
      .hub-banner {
        background: #1b1b1b;
        color: #f5f5f5;
        padding: 12px 24px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      .hub-banner strong { color: #7dd3fc; }
      .hub-banner code {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="hub-banner">
      <strong>Charity Platform</strong>
      — API docs hub via Kong.
      Select a service in the dropdown.
      Specs: <code>/api/&lt;service&gt;/openapi.json</code>
    </div>
    <div id="swagger-ui"></div>
    <script src="/docs/swagger-ui-bundle.js"></script>
    <script src="/docs/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = async function () {
        const res = await fetch("/docs/swagger-config.json", { cache: "no-store" });
        const cfg = await res.json();
        window.ui = SwaggerUIBundle({
          urls: cfg.urls,
          "urls.primaryName": cfg["urls.primaryName"],
          dom_id: cfg.dom_id,
          deepLinking: cfg.deepLinking,
          persistAuthorization: cfg.persistAuthorization,
          displayRequestDuration: cfg.displayRequestDuration,
          filter: cfg.filter,
          tryItOutEnabled: cfg.tryItOutEnabled,
          validatorUrl: cfg.validatorUrl,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
        });
      };
    </script>
  </body>
</html>
