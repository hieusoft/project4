# Production stack — pull pre-built images from GHCR (no build on server).
# Required env: IMAGE_REGISTRY, IMAGE_TAG, and a filled .env (see .env.example).
#
# Example:
#   export IMAGE_REGISTRY=ghcr.io/hieusoft/project4
#   export IMAGE_TAG=abc1234
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

name: charity-prod

x-app-env: &app-env
  env_file: .env
  restart: unless-stopped
  networks: [charity]

services:
  postgres:
    image: postgres:16-alpine
    <<: *app-env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-charity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-charity}
      POSTGRES_DB: ${POSTGRES_DB:-charity_root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-charity} -d $${POSTGRES_DB:-charity_root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *app-env
    ports: ["${REDIS_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    <<: *app-env
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -ip.bind=0.0.0.0
      - -master.volumeSizeLimitMB=100
    ports:
      - "${SEAWEED_S3_PORT:-8333}:8333"
      - "${SEAWEED_MASTER_PORT:-9333}:9333"
      - "${SEAWEED_FILER_PORT:-8888}:8888"
    volumes:
      - seaweedfs_data:/data
      - ./infra/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9333/cluster/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    <<: *app-env
    environment:
      RABBITMQ_LOAD_DEFINITIONS: /etc/rabbitmq/definitions.json
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  docs-portal:
    image: ${IMAGE_REGISTRY}/docs-portal:${IMAGE_TAG:-latest}
    <<: *app-env

  kong:
    image: kong:3.8
    <<: *app-env
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - docs-portal
      - identity-service
      - community-service
      - communication-service
      - media-service
      - ai-service
      - marketplace-service
      - donation-service

  identity-service:
    image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${IDENTITY_SERVICE_PORT:-3001}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  community-service:
    image: ${IMAGE_REGISTRY}/community-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${COMMUNITY_SERVICE_PORT:-3002}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  communication-service:
    image: ${IMAGE_REGISTRY}/communication-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${COMMUNICATION_SERVICE_PORT:-3005}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  media-service:
    image: ${IMAGE_REGISTRY}/media-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${MEDIA_SERVICE_PORT:-3006}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  ai-service:
    image: ${IMAGE_REGISTRY}/ai-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${AI_SERVICE_PORT:-3007}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  marketplace-service:
    image: ${IMAGE_REGISTRY}/marketplace-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${MARKETPLACE_SERVICE_PORT:-3004}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  donation-service:
    image: ${IMAGE_REGISTRY}/donation-service:${IMAGE_TAG:-latest}
    <<: *app-env
    environment:
      PORT: "${DONATION_SERVICE_PORT:-3003}"
      NODE_ENV: production
      COMMUNITY_SERVICE_URL: "http://community-service:3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      community-service:
        condition: service_started

networks:
  charity:
    driver: bridge

volumes:
  postgres_data:
  seaweedfs_data:
