services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-charity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-charity}
      POSTGRES_DB: ${POSTGRES_DB:-charity_root}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    environment:
      RABBITMQ_LOAD_DEFINITIONS: /etc/rabbitmq/definitions.json
    ports: ["${RABBITMQ_PORT:-5672}:5672", "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"]
    volumes:
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
  kong:
    image: kong:3.8
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports: ["${KONG_PROXY_PORT:-8000}:8000", "${KONG_ADMIN_PORT:-8001}:8001"]
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - identity-service
      - community-service
      - communication-service
      - media-service
      - ai-service
  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    env_file: .env
    environment: { PORT: "${IDENTITY_SERVICE_PORT:-3001}" }
    ports: ["${IDENTITY_SERVICE_PORT:-3001}:${IDENTITY_SERVICE_PORT:-3001}"]
    depends_on: [postgres, redis, rabbitmq]
  community-service:
    build:
      context: .
      args: { SERVICE_PATH: apps/community-service }
    env_file: .env
    environment: { NODE_ENV: production, PORT: "${COMMUNITY_SERVICE_PORT:-3002}" }
    ports: ["${COMMUNITY_SERVICE_PORT:-3002}:${COMMUNITY_SERVICE_PORT:-3002}"]
    depends_on: [postgres, redis, rabbitmq]
  communication-service:
    build:
      context: .
      args: { SERVICE_PATH: apps/communication-service }
    env_file: .env
    environment: { NODE_ENV: production, PORT: "${COMMUNICATION_SERVICE_PORT:-3005}" }
    ports: ["${COMMUNICATION_SERVICE_PORT:-3005}:${COMMUNICATION_SERVICE_PORT:-3005}"]
    depends_on: [postgres, redis, rabbitmq]
  media-service:
    build:
      context: .
      dockerfile: apps/media-service/Dockerfile
    env_file: .env
    environment: { PORT: "${MEDIA_SERVICE_PORT:-3006}" }
    ports: ["${MEDIA_SERVICE_PORT:-3006}:${MEDIA_SERVICE_PORT:-3006}"]
    depends_on: [postgres]
  ai-service:
    build:
      context: .
      args: { SERVICE_PATH: apps/ai-service }
    env_file: .env
    environment: { NODE_ENV: production, PORT: "${AI_SERVICE_PORT:-3007}" }
    ports: ["${AI_SERVICE_PORT:-3007}:${AI_SERVICE_PORT:-3007}"]
    depends_on: [postgres, redis, rabbitmq]
volumes:
  postgres_data:
