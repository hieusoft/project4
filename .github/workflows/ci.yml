name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "!.github/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            dockerfile: apps/identity-service/Dockerfile
            context: .
            build_args: ""
          - service: media-service
            dockerfile: apps/media-service/Dockerfile
            context: .
            build_args: ""
          - service: community-service
            dockerfile: apps/community-service/Dockerfile
            context: .
            build_args: ""
          - service: communication-service
            dockerfile: apps/communication-service/Dockerfile
            context: .
            build_args: ""
          - service: ai-service
            dockerfile: Dockerfile
            context: .
            build_args: SERVICE_PATH=apps/ai-service
          - service: docs-portal
            dockerfile: infra/docs-portal/Dockerfile
            context: infra/docs-portal
            build_args: ""
          - service: marketplace-service
            dockerfile: apps/marketplace-service/Dockerfile
            context: apps/marketplace-service
            build_args: ""
          - service: donation-service
            dockerfile: apps/donation-service/Dockerfile
            context: .
            build_args: ""
          - service: admin-dashboard
            dockerfile: Dockerfile
            context: admin-dashboard
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
