name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: this commit SHA)"
        required: false
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using IMAGE_TAG=${TAG}"

  build-and-push:
    name: Build & push ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: identity-service
            dockerfile: apps/identity-service/Dockerfile
            build_args: ""
          - service: media-service
            dockerfile: apps/media-service/Dockerfile
            build_args: ""
          - service: community-service
            dockerfile: Dockerfile
            build_args: SERVICE_PATH=apps/community-service
          - service: communication-service
            dockerfile: Dockerfile
            build_args: SERVICE_PATH=apps/communication-service
          - service: ai-service
            dockerfile: Dockerfile
            build_args: SERVICE_PATH=apps/ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          build-args: ${{ matrix.build_args }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          IMAGE_REGISTRY: ghcr.io/${{ github.repository }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_TAG,IMAGE_REGISTRY,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${DEPLOY_PATH:-/opt/charity-platform}"
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "ERROR: $APP_DIR/.env is missing. Copy from .env.example and fill secrets first."
              exit 1
            fi

            # Update compose + infra config from repo
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Pull private (or rate-limited) images from GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_REGISTRY IMAGE_TAG
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
